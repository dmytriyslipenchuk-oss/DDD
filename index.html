<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Генератор сертифікатів</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page">
    <aside class="panel">
      <h1>Генератор сертифікатів</h1>
      <p class="lead">Можна змінювати дату, номер і автонумерацію. <b>Версія: v4 ПІБ вирівняно</b></p>

      <div class="grid">
        <label>
          <span>Дата під номером</span>
          <input id="dateInput" value="27 лютого 2026 року" />
        </label>

        <label>
          <span>Статична частина до /</span>
          <input id="fixedPart" value="КЗ 44550814" />
        </label>

        <label>
          <span>Початковий номер після /</span>
          <input id="startSequence" type="number" value="25" />
        </label>

        <label>
          <span>Кількість цифр після /</span>
          <input id="digitsCount" type="number" value="6" />
        </label>

        <label>
          <span>Хвіст після номера</span>
          <input id="tailPart" value="-26" />
        </label>
      </div>

      <label class="block">
        <span>Список учасників</span>
        <textarea id="participants">Єремєєва Ірина Вікторівна
Сліпенчук Дмитро Сергійович</textarea>
      </label>

      <div class="buttons">
        <button id="previewBtn" class="primary">Показати попередній перегляд</button>
        <button id="downloadBtn" class="secondary">Завантажити сертифікати</button>
        <button id="exampleBtn" class="ghost">Підставити приклад</button>
      </div>

      <div id="status" class="status"></div>

      <div class="note">
        <b>Приклад номера:</b><br />
        КЗ 44550814/000025-26<br />
        КЗ 44550814/000026-26
      </div>
    </aside>

    <main class="preview">
      <h2>Попередній перегляд</h2>
      <canvas id="previewCanvas" width="2047" height="1510"></canvas>
    </main>
  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>
